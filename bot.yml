name: EPIC PROTECTOR — Bot 24/7

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  run-bot:
    name: Run Epic Protector Bot
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install python-telegram-bot==20.7 flask
          echo "✅ Dependencies installed"

      - name: Run Epic Protector
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
        run: |
          python3 epicprotector.py 2>&1 | tee bot_log.txt

      - name: Upload Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-crash-log
          path: bot_log.txt
          retention-days: 7
