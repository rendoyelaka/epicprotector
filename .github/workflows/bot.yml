name: EPIC PROTECTOR — Bot 24/7 Elite

# ══════════════════════════════════════════════════════════════════
# EPIC PROTECTOR — GitHub Actions Workflow
# ══════════════════════════════════════════════════════════════════
#
# ROOT CAUSE FIX:
#   Previous versions stored tools in /tmp/epic_tools
#   /tmp is wiped between every GitHub Actions job restart
#   Cache of /tmp is unreliable on GitHub Actions
#
#   This version stores ALL tools in $GITHUB_WORKSPACE/epic_tools
#   $GITHUB_WORKSPACE is the repo checkout directory — always available
#   Tools cached there persist reliably between all restarts
#
#   The script also reads GITHUB_WORKSPACE env var and uses it
#   as the base for TOOLS_DIR and WORK_DIR automatically
# ══════════════════════════════════════════════════════════════════

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: epic-protector-bot
  cancel-in-progress: true

jobs:
  run-bot:
    name: EPIC PROTECTOR — Elite Bot Runner (24-Step)
    runs-on: ubuntu-22.04
    timeout-minutes: 350

    steps:

      # ── Step 1 — Checkout ──────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2 — Python ────────────────────────────────────────
      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Step 3 — Validate Secrets ──────────────────────────────
      - name: Validate Required Secrets
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_ID:  ${{ secrets.ADMIN_ID }}
        run: |
          [ -z "$BOT_TOKEN" ] && echo "❌ BOT_TOKEN missing" && exit 1
          [ -z "$ADMIN_ID"  ] && echo "❌ ADMIN_ID missing"  && exit 1
          echo "✅ Secrets OK"

      # ── Step 4 — System Tools ──────────────────────────────────
      # ALWAYS runs — no cache-hit skip.
      # Installs libsmali-java every time (fast ~5s when cached).
      - name: Install System Tools
        run: |
          echo "📦 Installing system tools..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            default-jdk \
            zipalign \
            apksigner \
            wget \
            unzip \
            curl \
            libsmali-java
          echo "✅ System tools installed."
          java -version
          keytool -help > /dev/null 2>&1 \
            && echo "✅ keytool OK" \
            || { echo "❌ keytool missing"; exit 1; }

      # ── Step 5 — Python Dependencies ───────────────────────────
      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet
          python3 -c "import telegram;   print('✅ telegram-bot:',  telegram.__version__)"
          python3 -c "import flask;      print('✅ flask:',         flask.__version__)"
          python3 -c "import androguard; print('✅ androguard:',    androguard.__version__)"

      # ── Step 6 — Cache apktool + smali in WORKSPACE ────────────
      # CRITICAL: Cache path is $GITHUB_WORKSPACE/epic_tools
      # NOT /tmp/epic_tools — /tmp is wiped between restarts.
      # GITHUB_WORKSPACE is the repo dir — always present, reliably cached.
      - name: Cache Tools (apktool + smali)
        uses: actions/cache@v4
        id: tools-cache
        with:
          path: ${{ github.workspace }}/epic_tools
          key: epic-tools-apktool2.10.0-smali2.5.2-v1
          restore-keys: |
            epic-tools-

      # ── Step 7 — Install apktool ───────────────────────────────
      - name: Install apktool
        run: |
          mkdir -p "$GITHUB_WORKSPACE/epic_tools"
          APKTOOL_JAR="$GITHUB_WORKSPACE/epic_tools/apktool.jar"
          if [ ! -f "$APKTOOL_JAR" ]; then
            echo "📥 Downloading apktool v2.10.0..."
            wget -q -O "$APKTOOL_JAR" \
              "https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar"
          else
            echo "✅ apktool.jar from cache: $APKTOOL_JAR"
          fi
          [ -f "$APKTOOL_JAR" ] || { echo "❌ apktool.jar missing"; exit 1; }
          java -jar "$APKTOOL_JAR" --version \
            && echo "✅ apktool verified." \
            || { echo "❌ apktool failed"; exit 1; }

      # ── Step 8 — Install smali ─────────────────────────────────
      # Copies smali.jar to $GITHUB_WORKSPACE/epic_tools/smali.jar
      # This path is cached in Step 6 and persists between restarts.
      - name: Install smali
        run: |
          mkdir -p "$GITHUB_WORKSPACE/epic_tools"
          SMALI_DEST="$GITHUB_WORKSPACE/epic_tools/smali.jar"

          # Already cached and working?
          if [ -f "$SMALI_DEST" ]; then
            java -jar "$SMALI_DEST" --version 2>&1 | head -1 \
              && echo "✅ smali.jar from cache: $SMALI_DEST" && exit 0 \
              || echo "⚠️ Cached smali.jar invalid — reinstalling..."
          fi

          # Find jar installed by libsmali-java in Step 4
          SMALI_JAR=$(find /usr/share/java -name "smali.jar" 2>/dev/null | head -1)
          [ -z "$SMALI_JAR" ] && \
          SMALI_JAR=$(find /usr/share/java -name "smali*.jar" 2>/dev/null | head -1)

          if [ -n "$SMALI_JAR" ]; then
            cp "$SMALI_JAR" "$SMALI_DEST"
            java -jar "$SMALI_DEST" --version 2>&1 | head -1
            echo "✅ smali.jar ready: $SMALI_DEST"
          else
            # Binary fallback
            if which smali > /dev/null 2>&1; then
              echo "✅ smali binary: $(which smali)"
            else
              echo "❌ FATAL: smali not available"
              exit 1
            fi
          fi

      # ── Step 9 — Verify All Tools ──────────────────────────────
      - name: Verify All Tools Ready
        run: |
          TOOLS="$GITHUB_WORKSPACE/epic_tools"
          echo "🔍 Tool check — $TOOLS"

          [ -f "$TOOLS/apktool.jar" ] \
            && echo "✅ apktool.jar" \
            || { echo "❌ apktool.jar missing"; exit 1; }

          if [ -f "$TOOLS/smali.jar" ]; then
            echo "✅ smali.jar"
          elif which smali > /dev/null 2>&1; then
            echo "✅ smali binary: $(which smali)"
          else
            echo "❌ smali missing"
            exit 1
          fi

          echo "✅ All tools ready."
          ls -lh "$TOOLS/"

      # ── Step 10 — Confirm Script ───────────────────────────────
      - name: Confirm Bot Script Exists
        run: |
          [ -f "epicprotector.py" ] \
            && echo "✅ epicprotector.py — $(wc -l < epicprotector.py) lines" \
            || { echo "❌ epicprotector.py not found"; exit 1; }

      # ── Step 11 — Syntax Check ─────────────────────────────────
      - name: Python Syntax Check
        run: |
          python3 -c "
          import ast, sys
          with open('epicprotector.py') as f:
              src = f.read()
          try:
              ast.parse(src)
              print('✅ Syntax OK')
          except SyntaxError as e:
              print(f'❌ Syntax error line {e.lineno}: {e.msg}')
              sys.exit(1)
          "

      # ── Step 12 — Run Bot ───────────────────────────────────────
      # GITHUB_WORKSPACE passed as env so script uses it for TOOLS_DIR
      - name: Run EPIC PROTECTOR Bot
        env:
          BOT_TOKEN:        ${{ secrets.BOT_TOKEN }}
          ADMIN_ID:         ${{ secrets.ADMIN_ID }}
          GH_PAT:           ${{ secrets.GH_PAT }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          echo "🚀 Starting EPIC PROTECTOR Bot..."
          echo "⏰ $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "📁 TOOLS_DIR = $GITHUB_WORKSPACE/epic_tools"
          ls "$GITHUB_WORKSPACE/epic_tools/"
          python3 epicprotector.py 2>&1 | tee bot_log.txt
          echo "⏰ $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      # ── Step 13 — Upload Log ────────────────────────────────────
      - name: Upload Run Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epic-bot-log-${{ github.run_number }}
          path: bot_log.txt
          retention-days: 30
