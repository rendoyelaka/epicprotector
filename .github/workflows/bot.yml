name: EPIC PROTECTOR — Bot 24/7 Elite

# ══════════════════════════════════════════════════════════════════
# EPIC PROTECTOR — GitHub Actions Workflow
# Elite Master Hybrid Edition — 24-Step Pipeline
# ══════════════════════════════════════════════════════════════════
#
# Key fixes in this version:
#   1. libsmali-java ALWAYS installed — not skipped on cache hit
#   2. smali.jar verified and hard-fails if missing (exit 1)
#   3. /usr/share/java cached so smali survives between runs
#   4. Cache key v3 — forces clean rebuild to fix broken v1/v2 caches
#   5. GH_PAT passed to bot — Base APK GitHub storage works
#   6. smali binary fallback — works even without jar
#   7. All tool checks exit 1 on failure — no silent failures
# ══════════════════════════════════════════════════════════════════

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: epic-protector-bot
  cancel-in-progress: true

jobs:
  run-bot:
    name: EPIC PROTECTOR — Elite Bot Runner (24-Step)
    runs-on: ubuntu-22.04
    timeout-minutes: 350

    steps:

      # ── Step 1 — Checkout ──────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2 — Python Setup ──────────────────────────────────
      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Step 3 — Validate Secrets ──────────────────────────────
      - name: Validate Required Secrets
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_ID:  ${{ secrets.ADMIN_ID }}
        run: |
          [ -z "$BOT_TOKEN" ] && echo "❌ BOT_TOKEN missing" && exit 1
          [ -z "$ADMIN_ID"  ] && echo "❌ ADMIN_ID missing"  && exit 1
          echo "✅ All secrets present."

      # ── Step 4 — Cache apt + Java + smali ─────────────────────
      # v3 key — forces fresh install, fixes broken v1/v2 caches.
      # Caches /usr/share/java so smali.jar persists between runs.
      - name: Cache apt Packages
        uses: actions/cache@v4
        id: apt-cache
        with:
          path: |
            /var/cache/apt/archives
            /usr/lib/jvm
            /usr/bin/java
            /usr/bin/keytool
            /usr/bin/zipalign
            /usr/bin/apksigner
            /usr/share/java
            /usr/bin/smali
          key: apt-epic-tools-${{ runner.os }}-v3
          restore-keys: |
            apt-epic-tools-${{ runner.os }}-

      # ── Step 5 — Install System Tools ─────────────────────────
      # ALWAYS runs regardless of cache hit.
      # Reason: apt cache restores /var/cache/apt/archives but does
      # NOT restore actual installed binaries in /usr/bin or /usr/share.
      # Running apt-get install is instant when packages are cached.
      - name: Install System Tools
        run: |
          echo "📦 Installing system tools..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            default-jdk \
            zipalign \
            apksigner \
            wget \
            unzip \
            curl \
            libsmali-java
          echo "✅ System tools installed."

      # ── Step 6 — Verify System Tools ──────────────────────────
      - name: Verify System Tools
        run: |
          java -version
          keytool -help > /dev/null 2>&1 \
            && echo "✅ keytool OK" \
            || { echo "❌ keytool missing"; exit 1; }
          zipalign -h > /dev/null 2>&1 \
            && echo "✅ zipalign OK" \
            || echo "⚠️ zipalign non-zero (normal)"
          apksigner version \
            && echo "✅ apksigner OK" \
            || echo "⚠️ apksigner non-zero (normal)"

      # ── Step 7 — Python Dependencies ──────────────────────────
      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet
          python3 -c "import telegram;   print('✅ telegram-bot:',  telegram.__version__)"
          python3 -c "import flask;      print('✅ flask:',         flask.__version__)"
          python3 -c "import androguard; print('✅ androguard:',    androguard.__version__)"

      # ── Step 8 — Cache apktool.jar ─────────────────────────────
      - name: Cache apktool.jar
        uses: actions/cache@v4
        id: apktool-cache
        with:
          path: /tmp/epic_tools/apktool.jar
          key: apktool-v2.10.0

      # ── Step 9 — apktool ──────────────────────────────────────
      - name: Install apktool
        run: |
          mkdir -p /tmp/epic_tools
          APKTOOL_JAR="/tmp/epic_tools/apktool.jar"
          if [ ! -f "$APKTOOL_JAR" ]; then
            echo "📥 Downloading apktool v2.10.0..."
            wget -q -O "$APKTOOL_JAR" \
              "https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar"
          else
            echo "✅ apktool.jar from cache."
          fi
          [ -f "$APKTOOL_JAR" ] || { echo "❌ apktool.jar missing"; exit 1; }
          java -jar "$APKTOOL_JAR" --version \
            && echo "✅ apktool verified." \
            || { echo "❌ apktool failed"; exit 1; }

      # ── Step 10 — smali ───────────────────────────────────────
      # Critical for Asset Compiler (Step 17).
      # Always runs. Copies smali.jar to /tmp/epic_tools/smali.jar.
      # Hard-fails if smali is not available — so the error is
      # clear BEFORE the bot starts, not inside Asset Compiler.
      - name: Install smali
        run: |
          echo "📦 Installing smali assembler..."
          mkdir -p /tmp/epic_tools
          SMALI_DEST="/tmp/epic_tools/smali.jar"

          # Already present and working?
          if [ -f "$SMALI_DEST" ]; then
            java -jar "$SMALI_DEST" --version 2>&1 | head -1 \
              && echo "✅ smali.jar already ready." && exit 0 \
              || echo "⚠️ Existing smali.jar invalid — reinstalling..."
          fi

          # libsmali-java was installed in Step 5 — find the jar
          SMALI_JAR=$(find /usr/share/java -name "smali.jar"   2>/dev/null | head -1)
          [ -z "$SMALI_JAR" ] && \
          SMALI_JAR=$(find /usr/share/java -name "smali*.jar"  2>/dev/null | head -1)

          if [ -n "$SMALI_JAR" ]; then
            cp "$SMALI_JAR" "$SMALI_DEST"
            java -jar "$SMALI_DEST" --version 2>&1 | head -1
            echo "✅ smali.jar ready: $SMALI_DEST"
          else
            # Fallback — smali binary in PATH (also installed by libsmali-java)
            if which smali > /dev/null 2>&1; then
              echo "✅ smali binary available: $(which smali)"
              echo "   Asset Compiler will use smali binary directly."
            else
              echo "❌ FATAL: smali not available — Asset Compiler will fail."
              echo "   libsmali-java did not install correctly."
              exit 1
            fi
          fi

      # ── Step 11 — Final Tool Check ─────────────────────────────
      - name: Verify All Tools Ready
        run: |
          echo "🔍 Final tool check..."
          [ -f "/tmp/epic_tools/apktool.jar" ] \
            && echo "✅ apktool.jar ready" \
            || { echo "❌ apktool.jar missing"; exit 1; }

          if [ -f "/tmp/epic_tools/smali.jar" ]; then
            echo "✅ smali.jar ready"
          elif which smali > /dev/null 2>&1; then
            echo "✅ smali binary ready: $(which smali)"
          else
            echo "❌ smali not available — exit"
            exit 1
          fi

          echo "✅ All tools ready."

      # ── Step 12 — Confirm Script ───────────────────────────────
      - name: Confirm Bot Script Exists
        run: |
          [ -f "epicprotector.py" ] \
            && echo "✅ epicprotector.py found ($(wc -l < epicprotector.py) lines)" \
            || { echo "❌ epicprotector.py not found"; exit 1; }

      # ── Step 13 — Syntax Check ─────────────────────────────────
      - name: Python Syntax Check
        run: |
          python3 -c "
          import ast, sys
          with open('epicprotector.py') as f:
              src = f.read()
          try:
              ast.parse(src)
              print('✅ Syntax OK')
          except SyntaxError as e:
              print(f'❌ Syntax error line {e.lineno}: {e.msg}')
              sys.exit(1)
          "

      # ── Step 14 — Run Bot ──────────────────────────────────────
      # GH_PAT passed so Base APK GitHub storage works correctly.
      - name: Run EPIC PROTECTOR Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_ID:  ${{ secrets.ADMIN_ID }}
          GH_PAT:    ${{ secrets.GH_PAT }}
        run: |
          echo "🚀 Starting EPIC PROTECTOR Elite Bot..."
          echo "⏰ $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          python3 epicprotector.py 2>&1 | tee bot_log.txt
          echo "⏰ $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      # ── Step 15 — Upload Log ───────────────────────────────────
      - name: Upload Run Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epic-bot-log-${{ github.run_number }}
          path: bot_log.txt
          retention-days: 30
