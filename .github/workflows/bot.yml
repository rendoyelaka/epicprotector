name: EPIC PROTECTOR — Bot 24/7 Elite

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-bot:
    name: EPIC PROTECTOR — Elite Bot Runner (24-Step)
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Validate Required Secrets
        run: |
          echo "🔐 Validating required secrets..."
          [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && echo "❌ TELEGRAM_BOT_TOKEN missing" && exit 1
          [ -z "${{ secrets.ADMIN_CHAT_ID }}" ]      && echo "❌ ADMIN_CHAT_ID missing"      && exit 1
          echo "✅ All required secrets present."

      - name: Install System Tools
        run: |
          echo "📦 Installing system tools..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            default-jdk \
            zipalign \
            apksigner \
            wget \
            unzip \
            curl
          echo "✅ System tools installed."

      - name: Verify System Tools
        run: |
          echo "🔍 Verifying system tools..."
          java -version 2>&1 | head -1
          echo "✅ Java confirmed."
          keytool -help > /dev/null 2>&1 \
            && echo "✅ keytool confirmed." \
            || { echo "❌ keytool not found"; exit 1; }
          zipalign -h > /dev/null 2>&1 \
            && echo "✅ zipalign confirmed." \
            || echo "⚠️ zipalign non-zero (normal)."
          apksigner version > /dev/null 2>&1 \
            && echo "✅ apksigner confirmed." \
            || echo "⚠️ apksigner non-zero (normal)."
          echo "✅ System tools verified."

      - name: Install Python Dependencies
        run: |
          echo "🐍 Installing Python dependencies..."
          pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet
          echo "✅ Python dependencies installed."
          python3 -c "import telegram;   print('✅ python-telegram-bot:', telegram.__version__)"
          python3 -c "import flask;      print('✅ flask:',               flask.__version__)"
          python3 -c "import androguard; print('✅ androguard:',          androguard.__version__)"

      - name: Cache apktool.jar
        uses: actions/cache@v4
        id: apktool-cache
        with:
          path: ${{ github.workspace }}/epic_tools/apktool.jar
          key: epic-tools-apktool-2.10.0-v3

      - name: Pre-Download apktool
        run: |
          mkdir -p "$GITHUB_WORKSPACE/epic_tools"
          APKTOOL_JAR="$GITHUB_WORKSPACE/epic_tools/apktool.jar"
          if [ ! -f "$APKTOOL_JAR" ]; then
            echo "📥 Downloading apktool v2.10.0..."
            wget -q -O "$APKTOOL_JAR" \
              "https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar"
          else
            echo "✅ apktool.jar from cache."
          fi
          java -jar "$APKTOOL_JAR" --version \
            && echo "✅ apktool verified." \
            || { echo "❌ apktool failed"; exit 1; }

      - name: Verify Tool Readiness
        run: |
          echo "🔍 Verifying all protection tools are ready..."
          [ -f "$GITHUB_WORKSPACE/epic_tools/apktool.jar" ] \
            && echo "✅ apktool.jar ready" \
            || { echo "❌ apktool.jar missing"; exit 1; }
          echo "✅ Bootstrap DEX uses pure Python — no smali binary needed."
          echo "✅ Tool readiness check complete."

      - name: Confirm Bot Script Exists
        run: |
          [ -f "epicprotector.py" ] \
            && echo "✅ epicprotector.py found. Lines: $(wc -l < epicprotector.py)" \
            || { echo "❌ epicprotector.py not found"; exit 1; }

      - name: Python Syntax Validation
        run: |
          echo "🔍 Running Python syntax check..."
          python3 -c "
import ast, sys
with open('epicprotector.py') as f:
    src = f.read()
try:
    ast.parse(src)
    print('✅ Syntax check passed — epicprotector.py is valid.')
except SyntaxError as e:
    print(f'❌ Syntax error at line {e.lineno}: {e.msg}')
    sys.exit(1)
"

      - name: Run EPIC PROTECTOR Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_CHAT_ID:      ${{ secrets.ADMIN_CHAT_ID }}
          GITHUB_WORKSPACE:   ${{ github.workspace }}
        run: |
          echo "🚀 Starting EPIC PROTECTOR Elite Bot (24-Step Pipeline)..."
          echo "⏰ Start time: $(date -u)"
          python3 epicprotector.py 2>&1 | tee bot_log.txt

      - name: Upload Run Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epic-bot-log-${{ github.run_number }}
          path: bot_log.txt
          retention-days: 7
