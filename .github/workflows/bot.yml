name: EPIC PROTECTOR — Bot 24/7 Elite

# ══════════════════════════════════════════════════════════════════
# EPIC PROTECTOR — GitHub Actions Workflow
# Elite Master Hybrid Edition — 24-Step Pipeline
# ══════════════════════════════════════════════════════════════════
#
# What this workflow does:
#   - Runs bot 24/7 via 5-hour schedule restart
#   - Installs all tools needed for the 24-step pipeline
#   - Caches apktool.jar and smali.jar so restarts are fast
#   - Hard-fails if any critical tool is missing (no silent failures)
#   - Passes GH_PAT so Base APK storage works
#   - Uploads full log after every run
#
# Tool install strategy:
#   - Step 5: apt-get install runs EVERY time (no cache-hit skip)
#             Reason: apt cache stores .deb files but does NOT
#             restore installed binaries to /usr/share/java or /usr/bin
#             Running install when packages are cached takes ~5 seconds
#   - Step 8: apktool.jar cached by version key — never re-downloaded
#   - Step 9: smali.jar cached by version key — never re-installed
#             This is the critical fix: smali.jar now persists between
#             the 5-hour restart cycles, same as apktool.jar
# ══════════════════════════════════════════════════════════════════

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: epic-protector-bot
  cancel-in-progress: true

jobs:
  run-bot:
    name: EPIC PROTECTOR — Elite Bot Runner (24-Step)
    runs-on: ubuntu-22.04
    timeout-minutes: 350

    steps:

      # ── Step 1 — Checkout ──────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2 — Python ────────────────────────────────────────
      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Step 3 — Validate Secrets ──────────────────────────────
      - name: Validate Required Secrets
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_ID:  ${{ secrets.ADMIN_ID }}
        run: |
          [ -z "$BOT_TOKEN" ] && echo "❌ BOT_TOKEN missing" && exit 1
          [ -z "$ADMIN_ID"  ] && echo "❌ ADMIN_ID missing"  && exit 1
          echo "✅ Secrets OK"

      # ── Step 4 — System Tools (ALWAYS — no cache-hit skip) ─────
      # apt-get install runs every time.
      # apt cache stores .deb archives but does NOT restore installed
      # binaries to /usr/bin or /usr/share. So even on cache hit,
      # the actual tools are missing unless we install them.
      # When packages are cached, this step takes ~5 seconds.
      - name: Install System Tools
        run: |
          echo "📦 Installing system tools..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            default-jdk \
            zipalign \
            apksigner \
            wget \
            unzip \
            curl \
            libsmali-java
          echo "✅ System tools installed."
          java -version
          keytool -help > /dev/null 2>&1 \
            && echo "✅ keytool OK" \
            || { echo "❌ keytool missing"; exit 1; }

      # ── Step 5 — Python Dependencies ───────────────────────────
      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet
          python3 -c "import telegram;   print('✅ telegram-bot:',  telegram.__version__)"
          python3 -c "import flask;      print('✅ flask:',         flask.__version__)"
          python3 -c "import androguard; print('✅ androguard:',    androguard.__version__)"

      # ── Step 6 — Cache apktool.jar ─────────────────────────────
      # Cached by version string — only re-downloaded when version changes.
      - name: Cache apktool.jar
        uses: actions/cache@v4
        id: apktool-cache
        with:
          path: /tmp/epic_tools/apktool.jar
          key: apktool-v2.10.0

      # ── Step 7 — Install apktool ───────────────────────────────
      - name: Install apktool
        run: |
          mkdir -p /tmp/epic_tools
          APKTOOL_JAR="/tmp/epic_tools/apktool.jar"
          if [ ! -f "$APKTOOL_JAR" ]; then
            echo "📥 Downloading apktool v2.10.0..."
            wget -q -O "$APKTOOL_JAR" \
              "https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar"
          else
            echo "✅ apktool.jar from cache."
          fi
          [ -f "$APKTOOL_JAR" ] || { echo "❌ apktool.jar missing"; exit 1; }
          java -jar "$APKTOOL_JAR" --version \
            && echo "✅ apktool verified." \
            || { echo "❌ apktool failed"; exit 1; }

      # ── Step 8 — Cache smali.jar ───────────────────────────────
      # CRITICAL: Same pattern as apktool.jar.
      # smali.jar is used by Asset Compiler to compile the bootstrap DEX.
      # Without this cache, smali.jar is lost between 5-hour restarts
      # and must be re-installed every time from apt.
      # Cached by version — persists indefinitely until version changes.
      - name: Cache smali.jar
        uses: actions/cache@v4
        id: smali-cache
        with:
          path: /tmp/epic_tools/smali.jar
          key: smali-v2.5.2

      # ── Step 9 — Install smali ─────────────────────────────────
      # libsmali-java was installed in Step 4.
      # This step copies smali.jar from /usr/share/java to /tmp/epic_tools.
      # Hard-fails if smali is not available — clear error before bot starts.
      - name: Install smali
        run: |
          mkdir -p /tmp/epic_tools
          SMALI_DEST="/tmp/epic_tools/smali.jar"

          # Already cached and working?
          if [ -f "$SMALI_DEST" ]; then
            java -jar "$SMALI_DEST" --version 2>&1 | head -1 \
              && echo "✅ smali.jar from cache — ready." && exit 0 \
              || echo "⚠️ Cached smali.jar invalid — reinstalling..."
          fi

          # Find the jar installed by libsmali-java in Step 4
          SMALI_JAR=$(find /usr/share/java -name "smali.jar" 2>/dev/null | head -1)
          [ -z "$SMALI_JAR" ] && \
          SMALI_JAR=$(find /usr/share/java -name "smali*.jar" 2>/dev/null | head -1)

          if [ -n "$SMALI_JAR" ]; then
            cp "$SMALI_JAR" "$SMALI_DEST"
            java -jar "$SMALI_DEST" --version 2>&1 | head -1
            echo "✅ smali.jar copied and ready: $SMALI_DEST"
          else
            # Binary fallback — also installed by libsmali-java
            if which smali > /dev/null 2>&1; then
              echo "✅ smali binary available: $(which smali)"
              echo "   Asset Compiler will use smali binary directly."
            else
              echo "❌ FATAL: smali not available after install."
              echo "   libsmali-java may have failed. Check Step 4 output."
              exit 1
            fi
          fi

      # ── Step 10 — Final Tool Check ─────────────────────────────
      # Confirms every tool is present before bot starts.
      # Hard-fails immediately — no silent failures inside the bot.
      - name: Verify All Tools Ready
        run: |
          echo "🔍 Final tool check..."

          [ -f "/tmp/epic_tools/apktool.jar" ] \
            && echo "✅ apktool.jar" \
            || { echo "❌ apktool.jar missing"; exit 1; }

          if [ -f "/tmp/epic_tools/smali.jar" ]; then
            echo "✅ smali.jar"
          elif which smali > /dev/null 2>&1; then
            echo "✅ smali binary: $(which smali)"
          else
            echo "❌ smali missing — Asset Compiler will fail"
            exit 1
          fi

          java -version 2>&1 | head -1
          echo "✅ All tools ready."

      # ── Step 11 — Confirm Script ────────────────────────────────
      - name: Confirm Bot Script Exists
        run: |
          [ -f "epicprotector.py" ] \
            && echo "✅ epicprotector.py — $(wc -l < epicprotector.py) lines" \
            || { echo "❌ epicprotector.py not found"; exit 1; }

      # ── Step 12 — Syntax Check ──────────────────────────────────
      - name: Python Syntax Check
        run: |
          python3 -c "
          import ast, sys
          with open('epicprotector.py') as f:
              src = f.read()
          try:
              ast.parse(src)
              print('✅ Syntax OK')
          except SyntaxError as e:
              print(f'❌ Syntax error at line {e.lineno}: {e.msg}')
              sys.exit(1)
          "

      # ── Step 13 — Run Bot ───────────────────────────────────────
      # GH_PAT: required for Base APK storage on GitHub
      # BOT_TOKEN + ADMIN_ID: required for Telegram bot
      - name: Run EPIC PROTECTOR Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_ID:  ${{ secrets.ADMIN_ID }}
          GH_PAT:    ${{ secrets.GH_PAT }}
        run: |
          echo "🚀 Starting EPIC PROTECTOR Elite Bot..."
          echo "⏰ $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          python3 epicprotector.py 2>&1 | tee bot_log.txt
          echo "⏰ $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      # ── Step 14 — Upload Log ────────────────────────────────────
      - name: Upload Run Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epic-bot-log-${{ github.run_number }}
          path: bot_log.txt
          retention-days: 30
