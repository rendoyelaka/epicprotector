name: EPIC PROTECTOR — Bot 24/7 Elite

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-bot:
    name: EPIC PROTECTOR — Elite Bot Runner (24-Step)
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Validate Required Secrets
        run: |
          [ -z "${{ secrets.BOT_TOKEN }}" ] && echo "TELEGRAM_BOT_TOKEN missing" && exit 1
          [ -z "${{ secrets.ADMIN_ID }}" ] && echo "ADMIN_CHAT_ID missing" && exit 1
          echo "All required secrets present."

      - name: Install System Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            default-jdk \
            zipalign \
            apksigner \
            wget \
            unzip \
            curl
          echo "System tools installed."

      - name: Verify System Tools
        run: |
          java -version 2>&1 | head -1
          keytool -help > /dev/null 2>&1 && echo "keytool ok" || { echo "keytool not found"; exit 1; }
          zipalign -h > /dev/null 2>&1 && echo "zipalign ok" || echo "zipalign non-zero (normal)"
          apksigner version > /dev/null 2>&1 && echo "apksigner ok" || echo "apksigner non-zero (normal)"
          echo "System tools verified."

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet
          python3 -c "import telegram; print('python-telegram-bot:', telegram.__version__)"
          python3 -c "import flask; print('flask:', flask.__version__)"
          python3 -c "import androguard; print('androguard:', androguard.__version__)"

      - name: Cache apktool.jar
        uses: actions/cache@v4
        id: apktool-cache
        with:
          path: ${{ github.workspace }}/epic_tools/apktool.jar
          key: epic-tools-apktool-2.10.0-v3

      - name: Pre-Download apktool
        run: |
          mkdir -p "$GITHUB_WORKSPACE/epic_tools"
          APKTOOL_JAR="$GITHUB_WORKSPACE/epic_tools/apktool.jar"
          if [ ! -f "$APKTOOL_JAR" ]; then
            wget -q -O "$APKTOOL_JAR" "https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar"
          fi
          java -jar "$APKTOOL_JAR" --version && echo "apktool verified." || { echo "apktool failed"; exit 1; }

      - name: Verify Tool Readiness
        run: |
          [ -f "$GITHUB_WORKSPACE/epic_tools/apktool.jar" ] && echo "apktool.jar ready" || { echo "apktool.jar missing"; exit 1; }
          echo "Bootstrap DEX uses pure Python — no smali binary needed."
          echo "Tool readiness check complete."

      - name: Confirm Bot Script Exists
        run: |
          [ -f "epicprotector.py" ] && echo "epicprotector.py found" || { echo "epicprotector.py not found"; exit 1; }

      - name: Python Syntax Validation
        run: python3 -c "import ast; ast.parse(open('epicprotector.py').read()); print('Syntax valid.')"

      - name: Run EPIC PROTECTOR Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID:      ${{ secrets.ADMIN_ID }}
          GITHUB_WORKSPACE:   ${{ github.workspace }}
        run: |
          echo "Starting EPIC PROTECTOR Elite Bot..."
          python3 epicprotector.py 2>&1 | tee bot_log.txt

      - name: Upload Run Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epic-bot-log-${{ github.run_number }}
          path: bot_log.txt
          retention-days: 7
