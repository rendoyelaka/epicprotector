name: EPIC PROTECTOR — Bot 24/7 Elite

# ══════════════════════════════════════════════════════════════════
# EPIC PROTECTOR — GitHub Actions Workflow
# Elite Master Hybrid Edition — 22-Step Pipeline
# ══════════════════════════════════════════════════════════════════
#
# Triggers:
#   - Every push to main branch
#   - Manual trigger via GitHub Actions UI
#   - Auto-restart every 5 hours (keeps bot alive 24/7)
#
# Improvements over base version:
#   1. pip cache — python packages cached between runs
#   2. Environment validation — checks secrets before running
#   3. Always saves logs — full audit trail
#   4. Cleaner step naming — professional output
#   5. Longer retention for logs — 30 days
#   6. Bot startup confirmation step
#   7. Consistent tool versions pinned
#   8. keytool verified after JDK install — keystore generation guaranteed
#   9. default-jdk (full) used — keytool included, not headless
#  10. apktool.jar cached by version hash — never re-downloaded
#  11. Python syntax check before bot launch — catches errors early
#  12. KS_PASS / KS_KEY removed — script generates fresh keystores dynamically
#  13. Redundant crash upload merged — single clean log artifact
#  14. 22-Step pipeline reflected in all step labels
#  15. apt package cache — JDK and tools cached between runs
#  16. Full cache restore — startup time reduced from 9min to ~1min
#  17. Concurrency lock — old bot stops instantly when new push detected
# ══════════════════════════════════════════════════════════════════

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: epic-protector-bot
  cancel-in-progress: true

jobs:
  run-bot:
    name: EPIC PROTECTOR — Elite Bot Runner (22-Step)
    runs-on: ubuntu-22.04
    timeout-minutes: 350

    steps:

      # ── Step 1 — Checkout Repository ───────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2 — Set Up Python 3.11 ────────────────────────────
      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Step 3 — Validate Required Secrets ─────────────────────
      - name: Validate Required Secrets
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
        run: |
          echo "🔍 Validating required secrets..."
          if [ -z "$BOT_TOKEN" ]; then
            echo "❌ ERROR: BOT_TOKEN secret is missing."
            exit 1
          fi
          if [ -z "$ADMIN_ID" ]; then
            echo "❌ ERROR: ADMIN_ID secret is missing."
            exit 1
          fi
          echo "✅ All required secrets are present."

      # ── Step 4 — Cache apt Packages ────────────────────────────
      # Caches default-jdk, zipalign, apksigner and all apt deps.
      # First run downloads and stores cache — all future runs
      # restore from cache in under 45 seconds instead of 8 minutes.
      - name: Cache apt Packages
        uses: actions/cache@v4
        id: apt-cache
        with:
          path: |
            /var/cache/apt/archives
            /usr/lib/jvm
            /usr/bin/java
            /usr/bin/keytool
            /usr/bin/zipalign
            /usr/bin/apksigner
          key: apt-epic-tools-${{ runner.os }}-v1
          restore-keys: |
            apt-epic-tools-${{ runner.os }}-

      # ── Step 5 — Install System Tools ──────────────────────────
      # Uses default-jdk (full) so keytool is available for
      # fresh keystore generation per job.
      # Skipped automatically if apt cache is restored.
      - name: Install System Tools
        if: steps.apt-cache.outputs.cache-hit != 'true'
        run: |
          echo "📦 Installing system tools..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            default-jdk \
            zipalign \
            apksigner \
            wget \
            unzip \
            curl
          echo "✅ System tools installed."

      # ── Step 6 — Verify System Tools ───────────────────────────
      # Always runs — confirms tools are available whether
      # restored from cache or freshly installed.
      - name: Verify System Tools
        run: |
          echo "🔍 Verifying system tools..."
          java -version
          echo "✅ Java confirmed."
          keytool -help > /dev/null 2>&1 && echo "✅ keytool confirmed." || { echo "❌ ERROR: keytool not found."; exit 1; }
          zipalign -h > /dev/null 2>&1 && echo "✅ zipalign confirmed." || echo "⚠️ zipalign check returned non-zero (normal)."
          apksigner version && echo "✅ apksigner confirmed." || echo "⚠️ apksigner version check returned non-zero (normal)."

      # ── Step 7 — Install Python Dependencies ───────────────────
      - name: Install Python Dependencies
        run: |
          echo "🐍 Installing Python dependencies from requirements.txt..."
          pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet
          echo "✅ Python dependencies installed."
          python3 -c "import telegram; print('✅ python-telegram-bot:', telegram.__version__)"
          python3 -c "import flask; print('✅ flask:', flask.__version__)"

      # ── Step 8 — Cache apktool.jar ─────────────────────────────
      # Caches apktool.jar by version string.
      # Only re-downloaded when version changes.
      # Saves 1 min per run on cold starts.
      - name: Cache apktool.jar
        uses: actions/cache@v4
        id: apktool-cache
        with:
          path: /tmp/epic_tools/apktool.jar
          key: apktool-v2.10.0

      # ── Step 9 — Download apktool if not cached ────────────────
      - name: Pre-Download apktool
        run: |
          mkdir -p /tmp/epic_tools
          APKTOOL_URL="https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar"
          APKTOOL_JAR="/tmp/epic_tools/apktool.jar"
          if [ ! -f "$APKTOOL_JAR" ]; then
            echo "📥 Downloading apktool.jar..."
            wget -q -O "$APKTOOL_JAR" "$APKTOOL_URL"
          else
            echo "✅ apktool.jar restored from cache."
          fi
          if [ -f "$APKTOOL_JAR" ]; then
            echo "✅ apktool.jar ready: $(du -sh $APKTOOL_JAR | cut -f1)"
          else
            echo "❌ ERROR: apktool.jar not available."
            exit 1
          fi
          java -jar "$APKTOOL_JAR" --version && echo "✅ apktool verified." || { echo "❌ apktool failed to run."; exit 1; }

      # ── Step 10 — Confirm Bot Script Exists ────────────────────
      - name: Confirm Bot Script Exists
        run: |
          if [ ! -f "epicprotector.py" ]; then
            echo "❌ ERROR: epicprotector.py not found in repository."
            exit 1
          fi
          echo "✅ epicprotector.py found."
          echo "📄 Script size: $(wc -l < epicprotector.py) lines"

      # ── Step 11 — Python Syntax Validation ─────────────────────
      # Validates Python syntax before launching the bot.
      # Catches any script errors immediately — prevents silent failures.
      - name: Python Syntax Validation
        run: |
          echo "🔍 Running Python syntax check on epicprotector.py..."
          python3 -c "
          import ast, sys
          with open('epicprotector.py', 'r') as f:
              source = f.read()
          try:
              ast.parse(source)
              print('✅ Syntax check passed — epicprotector.py is valid.')
          except SyntaxError as e:
              print(f'❌ Syntax error at line {e.lineno}: {e.msg}')
              print(f'   Text: {e.text}')
              sys.exit(1)
          "

      # ── Step 12 — Run EPIC PROTECTOR Bot ───────────────────────
      # KS_PASS and KS_KEY not required — script generates fresh
      # keystores dynamically per job and destroys them after signing.
      - name: Run EPIC PROTECTOR Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
        run: |
          echo "🚀 Starting EPIC PROTECTOR Elite Bot (22-Step Pipeline)..."
          echo "⏰ Start time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          python3 epicprotector.py 2>&1 | tee bot_log.txt
          echo "⏰ End time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      # ── Step 13 — Upload Full Log Always ───────────────────────
      # Single unified log artifact — always uploaded whether
      # the run succeeded or failed.
      # Retention: 30 days for full audit trail coverage.
      - name: Upload Run Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epic-bot-log-${{ github.run_number }}
          path: bot_log.txt
          retention-days: 30
