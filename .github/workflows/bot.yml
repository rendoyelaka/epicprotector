name: EPIC PROTECTOR — Bot 24/7 Elite

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'sbs_state.json'
      - 'sbs_workspace.tar.gz'
      - 'config.json'
      - 'companion.apk'
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

# ── CONCURRENCY — separate groups so notify cancels independently ─────────────
# notify-push uses its own group so it always fires instantly and is never
# blocked or cancelled by the bot runner group.
# run-bot cancels any in-progress bot run the moment a new push lands.

jobs:

  # ── PUSH NOTIFICATION — fires immediately, never cancelled ──────────────────
  notify-push:
    name: Push Notification
    runs-on: ubuntu-22.04
    concurrency:
      group: epic-protector-notify-${{ github.ref }}
      cancel-in-progress: false
    if: |
      github.event_name == 'push' &&
      !startsWith(github.event.head_commit.message, 'EpicProtector:')
    steps:
      - name: Send Push Notification to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_ID:  ${{ secrets.ADMIN_ID }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="🔔 *EPIC PROTECTOR — New Update*%0A%0A"
          MESSAGE="${MESSAGE}📦 Repo: \`${{ github.repository }}\`%0A"
          MESSAGE="${MESSAGE}🌿 Branch: \`${{ github.ref_name }}\`%0A"
          MESSAGE="${MESSAGE}👤 Author: \`${{ github.actor }}\`%0A"
          MESSAGE="${MESSAGE}📝 Change: \`${{ github.event.head_commit.message }}\`%0A"
          MESSAGE="${MESSAGE}🔖 Commit: \`${SHORT_SHA}\`%0A%0A"
          MESSAGE="${MESSAGE}⚠️ Any previous bot run has been stopped.%0A"
          MESSAGE="${MESSAGE}⚙️ [Starting fresh — View Run](${RUN_URL})"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${ADMIN_ID}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="true" \
            -d text="${MESSAGE}"
          echo "✅ Push notification sent."

  # ── BOT RUNNER ─────────────────────────────────────────────────────────────
  run-bot:
    name: EPIC PROTECTOR — Elite Bot Runner
    runs-on: ubuntu-22.04
    timeout-minutes: 350
    concurrency:
      group: epic-protector-bot
      cancel-in-progress: true

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Validate Required Secrets
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_ID:  ${{ secrets.ADMIN_ID }}
        run: |
          if [ -z "$BOT_TOKEN" ]; then echo "❌ BOT_TOKEN missing"; exit 1; fi
          if [ -z "$ADMIN_ID" ];  then echo "❌ ADMIN_ID missing";  exit 1; fi
          echo "✅ All required secrets present."

      # ── APT PACKAGE CACHE — cache .deb files so apt-get install is instant ──
      # Caching /var/cache/apt/archives means apt unpacks from local disk
      # instead of downloading — cuts install from ~2 min to ~15 sec.
      # restore-keys fallback means even a key miss gets a partial hit.
      - name: Cache APT Packages
        id: apt-cache
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ubuntu22-jdk-zipalign-apksigner-smali-v1
          restore-keys: |
            apt-ubuntu22-jdk-zipalign-apksigner-smali-
            apt-ubuntu22-

      - name: Install System Tools
        run: |
          echo "📥 Installing system tools..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            default-jdk \
            zipalign \
            apksigner \
            libsmali-java \
            wget \
            unzip \
            curl
          echo "✅ System tools installed."
          echo "apksigner version: $(apksigner version 2>&1 || echo 'unknown')"

      - name: Verify System Tools
        run: |
          java -version 2>&1 | head -1
          keytool -help > /dev/null 2>&1 && echo "✅ keytool ok" || { echo "❌ keytool missing"; exit 1; }
          zipalign -h > /dev/null 2>&1 && echo "✅ zipalign ok" || echo "⚠️ zipalign non-zero (normal)"
          apksigner version > /dev/null 2>&1 && echo "✅ apksigner ok" || echo "⚠️ apksigner non-zero (normal)"
          smali --version > /dev/null 2>&1 && echo "✅ smali ok" || echo "⚠️ smali not available"

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet
          python3 -c "import telegram;   print('✅ python-telegram-bot:', telegram.__version__)"
          python3 -c "import flask;      print('✅ flask:',               flask.__version__)"
          python3 -c "import androguard; print('✅ androguard:',          androguard.__version__)"

      # ── APKTOOL CACHE ──────────────────────────────────────────────────────
      - name: Cache apktool.jar
        uses: actions/cache@v4
        id: apktool-cache
        with:
          path: ${{ github.workspace }}/epic_tools/apktool.jar
          key: epic-tools-apktool-3.0.2-v1

      - name: Pre-Download apktool
        run: |
          mkdir -p "$GITHUB_WORKSPACE/epic_tools"
          APKTOOL_JAR="$GITHUB_WORKSPACE/epic_tools/apktool.jar"
          if [ -f "$APKTOOL_JAR" ]; then
            echo "✅ apktool.jar from cache."
          else
            echo "📥 Downloading apktool v3.0.2..."
            wget -q -O "$APKTOOL_JAR" "https://github.com/iBotPeaches/Apktool/releases/download/v3.0.2/apktool_3.0.2.jar"
          fi
          java -jar "$APKTOOL_JAR" --version && echo "✅ apktool verified." || { echo "❌ apktool failed"; exit 1; }

      - name: Restore Master Root Certificate
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          MASTER_ROOT_DIR="$GITHUB_WORKSPACE/epic_tools/master_root"
          mkdir -p "$MASTER_ROOT_DIR"
          if [ -f "$GITHUB_WORKSPACE/master_root/master_root.jks" ]; then
            cp "$GITHUB_WORKSPACE/master_root/master_root.jks"  "$MASTER_ROOT_DIR/master_root.jks"
            cp "$GITHUB_WORKSPACE/master_root/master_root.json" "$MASTER_ROOT_DIR/master_root.json"
            sed -i "s|\"keystore_path\": \"[^\"]*\"|\"keystore_path\": \"$MASTER_ROOT_DIR/master_root.jks\"|g" \
              "$MASTER_ROOT_DIR/master_root.json"
            echo "✅ Master root certificate restored."
          else
            echo "⚠️ master_root/ not in repo — will generate fresh."
          fi

      - name: Verify Tool Readiness
        run: |
          [ -f "$GITHUB_WORKSPACE/epic_tools/apktool.jar" ] && echo "✅ apktool.jar ready" || { echo "❌ apktool.jar missing"; exit 1; }
          echo "✅ Tool readiness check complete."

      - name: Confirm Bot Script Exists
        run: |
          [ -f "epicprotector.py" ] && echo "✅ epicprotector.py found — $(wc -l < epicprotector.py) lines" || { echo "❌ epicprotector.py not found"; exit 1; }

      - name: Setup Companion APK
        run: |
          mkdir -p "$GITHUB_WORKSPACE/epic_protector/base_apk"
          if [ -f "companion.apk" ]; then
            cp "companion.apk" "$GITHUB_WORKSPACE/epic_protector/base_apk/companion.apk"
            echo "✅ companion.apk placed: $(du -sh $GITHUB_WORKSPACE/epic_protector/base_apk/companion.apk)"
          else
            echo "⚠️ companion.apk not in repo — bot will load via GitHub API on startup."
          fi

      - name: Python Syntax Validation
        run: python3 -c "import ast; ast.parse(open('epicprotector.py').read()); print('✅ Syntax valid.')"

      - name: Run EPIC PROTECTOR Bot
        env:
          BOT_TOKEN:        ${{ secrets.BOT_TOKEN }}
          ADMIN_ID:         ${{ secrets.ADMIN_ID }}
          GH_PAT:           ${{ secrets.GH_PAT }}
          KS_PASS:          ${{ secrets.KS_PASS }}
          KS_KEY:           ${{ secrets.KS_KEY }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
          EPIC_DEBUG:       "1"
        run: |
          echo "🚀 Starting EPIC PROTECTOR Elite Bot..."
          echo "⏰ Start time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          python3 -u epicprotector.py 2>&1 | tee bot_log.txt
          echo "⏰ End time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Show Last 200 Lines of Log
        if: always()
        run: |
          echo "========== LAST 200 LOG LINES =========="
          tail -200 bot_log.txt || echo "No log file found"

      - name: Show All ERROR and WARNING Lines
        if: always()
        run: |
          echo "========== ALL ERRORS & WARNINGS =========="
          grep -n -E "ERROR|WARNING|error|exception|Exception|Traceback|❌" bot_log.txt || echo "No errors found"

      - name: Show Signing and Protection Logs
        if: always()
        run: |
          echo "========== SIGNING + PROTECTION LOGS =========="
          grep -n -E "SigningLineage|MasterRoot|CertAging|apksigner|keytool|zipalign|protection_score|EPIC_PROTECTED" bot_log.txt || echo "No matching lines"

      - name: Upload Full Run Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epic-bot-log-${{ github.run_number }}
          path: bot_log.txt
          retention-days: 30
